name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC role assumption

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}
  TF_BACKEND_KEY: whereismyinstance/terraform.tfstate

jobs:
  deploy:
    name: Deploy infrastructure and code
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      # ── AWS credentials ────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      # ── Python setup ───────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Download IP range files ────────────────────────
      - name: Download IP range files
        run: python scripts/download_ip_ranges.py

      # ── Install Lambda dependencies ────────────────────
      - name: Install Lambda Python dependencies
        run: pip install -r lambda/requirements.txt -t lambda/

      # ── Build Lambda zip ───────────────────────────────
      - name: Build Lambda zip
        run: |
          mkdir -p dist
          cd lambda
          zip -r ../dist/lambda.zip . -x "*.pyc" -x "__pycache__/*"

      # ── Terraform init ─────────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ env.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        env:
          TF_VAR_domain_name:          ${{ vars.DOMAIN_NAME }}
          TF_VAR_hosted_zone_id:       ${{ vars.HOSTED_ZONE_ID }}
          TF_VAR_acm_certificate_arn:  ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_aws_region:           ${{ env.AWS_REGION }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_domain_name:          ${{ vars.DOMAIN_NAME }}
          TF_VAR_hosted_zone_id:       ${{ vars.HOSTED_ZONE_ID }}
          TF_VAR_acm_certificate_arn:  ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_aws_region:           ${{ env.AWS_REGION }}
        run: terraform apply -auto-approve tfplan

      # ── Fetch Terraform outputs ────────────────────────
      - name: Read Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          echo "lambda_function=$(terraform output -raw lambda_function_name)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)"      >> "$GITHUB_OUTPUT"
          echo "cf_distribution=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      # ── Deploy Lambda code ─────────────────────────────
      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "${{ steps.tf.outputs.lambda_function }}" \
            --zip-file fileb://dist/lambda.zip \
            --region "${{ env.AWS_REGION }}"

          # Wait for the update to complete before publishing
          aws lambda wait function-updated \
            --function-name "${{ steps.tf.outputs.lambda_function }}" \
            --region "${{ env.AWS_REGION }}"

      # ── Deploy frontend ────────────────────────────────
      - name: Sync frontend to S3
        run: |
          aws s3 sync . "s3://${{ steps.tf.outputs.frontend_bucket }}/" \
            --exclude "*" \
            --include "index.html" \
            --cache-control "public, max-age=300" \
            --region "${{ env.AWS_REGION }}"

      # ── Invalidate CloudFront cache ────────────────────
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.cf_distribution }}" \
            --paths "/*"
